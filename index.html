<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>기준일 법령 조문 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0e0f14;--s:#161820;--s2:#1e2030;--bd:#2a2d3e;--bd2:#363950;--tx:#cdd6f4;--dim:#6c7086;--sub:#9399b2;--ac:#89b4fa;--ac2:#cba6f7;--gr:#a6e3a1;--ye:#f9e2af;--re:#f38ba8;--te:#94e2d5;--pe:#fab387;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;min-height:100vh;line-height:1.6;}
header{border-bottom:1px solid var(--bd);padding:0 2rem;display:flex;align-items:center;gap:1rem;height:60px;background:var(--s);}
.logo{font-family:'Noto Serif KR',serif;font-size:1.1rem;font-weight:700;color:var(--ac);}
.logo span{color:var(--sub);font-weight:400;font-size:.82rem;margin-left:.5rem;}
.tag{margin-left:auto;font-size:.72rem;color:var(--dim);font-family:'JetBrains Mono',monospace;border:1px solid var(--bd2);padding:2px 8px;border-radius:4px;}
.container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;display:grid;gap:1.5rem;}
.card{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:1.5rem;}
.ct{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;}
.ct::before{content:'';display:inline-block;width:3px;height:14px;background:var(--ac);border-radius:2px;}
.notice{background:color-mix(in srgb,var(--ac) 8%,transparent);border:1px solid color-mix(in srgb,var(--ac) 30%,transparent);border-radius:8px;padding:1rem 1.2rem;font-size:.85rem;color:var(--sub);line-height:1.7;}
.notice a{color:var(--ac);text-decoration:none;}
.notice strong{color:var(--tx);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:640px){.fg{grid-template-columns:1fr;}}
.fi{display:flex;flex-direction:column;gap:.4rem;}
.fi.full{grid-column:1/-1;}
label{font-size:.78rem;font-weight:500;color:var(--sub);}
input[type=text],input[type=date]{background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:.65rem .9rem;color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
input:focus{border-color:var(--ac);box-shadow:0 0 0 3px color-mix(in srgb,var(--ac) 15%,transparent);}
input::placeholder{color:var(--dim);}
.hint{font-size:.72rem;color:var(--dim);}
.btnr{display:flex;gap:.8rem;margin-top:.5rem;flex-wrap:wrap;}
button{padding:.65rem 1.4rem;border-radius:8px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.4rem;}
.bp{background:var(--ac);color:#0e0f14;}
.bp:hover{filter:brightness(1.1);transform:translateY(-1px);}
.bp:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.bs{background:var(--s2);color:var(--sub);border:1px solid var(--bd2);}
.bs:hover{border-color:var(--sub);color:var(--tx);}
.sw{position:relative;}
.sw .sp{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;}
.dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;z-index:200;max-height:260px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.dd.open{display:block;}
.di{padding:.65rem 1rem;cursor:pointer;font-size:.875rem;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:.5rem;}
.di:last-child{border-bottom:none;}
.di:hover,.di.hl{background:color-mix(in srgb,var(--ac) 12%,transparent);}
.dn{color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dm{font-size:.72rem;color:var(--dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;flex-shrink:0;}
.de{padding:.8rem 1rem;font-size:.85rem;color:var(--dim);text-align:center;}
.sb{display:flex;align-items:center;gap:.8rem;padding:.8rem 1rem;background:var(--s2);border-radius:8px;font-size:.83rem;color:var(--sub);}
.sp{width:16px;height:16px;border:2px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.sl{display:flex;flex-direction:column;gap:.3rem;margin-top:.8rem;}
.st{font-size:.78rem;color:var(--dim);display:flex;align-items:flex-start;gap:.5rem;font-family:'JetBrains Mono',monospace;line-height:1.5;}
.st.done{color:var(--gr);}
.st.doing{color:var(--ac);}
.st.fail{color:var(--re);}
.si{width:14px;text-align:center;flex-shrink:0;margin-top:1px;}
.eb{background:color-mix(in srgb,var(--re) 8%,transparent);border:1px solid color-mix(in srgb,var(--re) 30%,transparent);border-radius:8px;padding:1rem 1.2rem;color:var(--re);font-size:.875rem;display:none;white-space:pre-line;line-height:1.8;}
.eb.on{display:block;}
.bx{font-size:.72rem;padding:2px 10px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-weight:500;}
.bb{background:color-mix(in srgb,var(--ac) 15%,transparent);color:var(--ac);border:1px solid color-mix(in srgb,var(--ac) 30%,transparent);}
.bg{background:color-mix(in srgb,var(--gr) 15%,transparent);color:var(--gr);border:1px solid color-mix(in srgb,var(--gr) 30%,transparent);}
.by{background:color-mix(in srgb,var(--ye) 15%,transparent);color:var(--ye);border:1px solid color-mix(in srgb,var(--ye) 30%,transparent);}
.bt{background:color-mix(in srgb,var(--te) 15%,transparent);color:var(--te);border:1px solid color-mix(in srgb,var(--te) 30%,transparent);}
.bpp{background:color-mix(in srgb,var(--pe) 15%,transparent);color:var(--pe);border:1px solid color-mix(in srgb,var(--pe) 30%,transparent);}
#result{display:none;}
.rh{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.rt{font-family:'Noto Serif KR',serif;font-size:1.4rem;font-weight:700;color:var(--tx);}
.rm{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.4rem;}
.ll{display:inline-flex;align-items:center;gap:.35rem;font-size:.8rem;color:var(--ac);text-decoration:none;border:1px solid color-mix(in srgb,var(--ac) 30%,transparent);border-radius:6px;padding:4px 10px;white-space:nowrap;}
.ll:hover{background:color-mix(in srgb,var(--ac) 10%,transparent);}
.sl2{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:.8rem;padding-bottom:.5rem;border-bottom:1px solid var(--bd);}
.as{margin-bottom:2rem;}
.ar{background:var(--s2);border:1px solid var(--bd);border-radius:8px;margin-bottom:.5rem;overflow:hidden;}
.ah{padding:.75rem 1rem;display:flex;align-items:center;gap:.8rem;cursor:pointer;user-select:none;}
.ah:hover{background:color-mix(in srgb,var(--ac) 5%,transparent);}
.an{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--ac);font-weight:500;min-width:90px;flex-shrink:0;}
.at{font-size:.9rem;color:var(--tx);flex:1;}
.av{color:var(--dim);font-size:.75rem;transition:transform .2s;flex-shrink:0;}
.ar.open .av{transform:rotate(180deg);}
.ab{display:none;padding:.8rem 1rem 1rem;border-top:1px solid var(--bd);font-size:.875rem;line-height:2;color:var(--sub);white-space:pre-wrap;word-break:keep-all;}
.ar.open .ab{display:block;}
.ad{background:color-mix(in srgb,var(--ac2) 5%,var(--s2));border:1px solid color-mix(in srgb,var(--ac2) 20%,var(--bd));border-radius:8px;margin-bottom:.5rem;overflow:hidden;}
.ad .an{color:var(--ac2);}
.ib{background:color-mix(in srgb,var(--te) 7%,transparent);border:1px solid color-mix(in srgb,var(--te) 25%,transparent);border-radius:8px;padding:.9rem 1rem;font-size:.84rem;color:var(--te);line-height:1.7;margin-bottom:1rem;}
.wb{background:color-mix(in srgb,var(--ye) 7%,transparent);border:1px solid color-mix(in srgb,var(--ye) 25%,transparent);border-radius:8px;padding:.9rem 1rem;font-size:.84rem;color:var(--ye);line-height:1.7;margin-bottom:1rem;}
.dtg{font-size:.75rem;color:var(--dim);cursor:pointer;text-decoration:underline;margin-top:.6rem;display:none;}
.dbox{background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:.8rem 1rem;font-size:.72rem;color:var(--dim);font-family:'JetBrains Mono',monospace;max-height:280px;overflow-y:auto;margin-top:.4rem;white-space:pre-wrap;word-break:break-all;display:none;}
.dbox.on{display:block;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
</style>
</head>
<body>
<header>
  <div class="logo">⚖ 기준일 법령 조문 조회<span>국가법령정보센터 연동</span></div>
  <div class="tag">law.go.kr / DRF API</div>
</header>
<div class="container">

  <div class="card">
    <div class="ct">API 인증키 설정</div>
    <div class="notice"><strong>국가법령정보 공동활용 Open API</strong> 인증키가 필요합니다.
      <a href="https://open.law.go.kr/LSO/main.do" target="_blank">open.law.go.kr</a> 회원가입 후 마이페이지에서 무료 발급받으세요.
    </div>
    <div style="margin-top:1rem" class="fi">
      <label>인증키 (OC)</label>
      <input type="text" id="apiKey" placeholder="발급받은 인증키 입력" autocomplete="off"/>
    </div>
  </div>

  <div class="card">
    <div class="ct">검색 조건</div>
    <div class="fg">
      <div class="fi">
        <label>기준일자</label>
        <input type="date" id="baseDate"/>
        <span class="hint">해당 날짜에 시행 중이던 법령 버전을 조회합니다</span>
      </div>
      <div class="fi">
        <label>법령명</label>
        <div class="sw">
          <input type="text" id="lawName" placeholder="예: 소득세법, 민법, 근로기준법" autocomplete="off"/>
          <div id="acSpinner" class="sp" style="display:none"></div>
          <div class="dd" id="lawDD"></div>
        </div>
        <span class="hint">2글자 이상 입력 후 목록에서 선택 · ↑↓ Enter 키 지원</span>
      </div>
      <div class="fi full">
        <label>특정 조문 번호 (선택 — 비워두면 전체 조문)</label>
        <input type="text" id="artNo" placeholder="예: 제1조  /  14  /  제14조의2" autocomplete="off"/>
      </div>
    </div>
    <div class="btnr">
      <button class="bp" id="searchBtn" onclick="go()">🔍 조문 조회</button>
      <button class="bs" onclick="reset()">초기화</button>
    </div>
  </div>

  <div class="card" id="progCard" style="display:none">
    <div class="sb"><div class="sp"></div><span id="statusMsg">조회 중...</span></div>
    <div class="sl" id="stepList"></div>
    <span class="dtg" id="dtg" onclick="toggleDbg()">▼ 원본 XML 확인 (디버그)</span>
    <div class="dbox" id="dbox"></div>
  </div>

  <div class="eb" id="errBox"></div>

  <div class="card" id="result">
    <div class="rh">
      <div><div class="rt" id="rTitle"></div><div class="rm" id="rMeta"></div></div>
      <a id="rLink" class="ll" target="_blank">🔗 법령정보센터</a>
    </div>
    <div id="rContent"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  설정
// ══════════════════════════════════════════════════
const API = 'https://www.law.go.kr/DRF';

// CORS 프록시 (autocomplete: 1~2개만 빠르게 / 본검색: 전체)
const PROXIES = [
  {name:'corsproxy', build: u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,             timeout:5000},
  {name:'allorigins',build: u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,    timeout:7000},
  {name:'codetabs',  build: u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,timeout:8000},
  {name:'thingproxy',build: u=>`https://thingproxy.freeboard.io/fetch/${u}`,                     timeout:10000},
];

const ACcache = new Map();    // 자동완성 캐시 (쿼리 → 결과)
let   acAbort = null;          // 자동완성 AbortController
let   acTimer = null;
let   selItem = null;
let   hlIdx   = -1;            // 키보드 하이라이트 인덱스
let   lastXml = '';

// ══════════════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════════════
window.addEventListener('load',()=>{
  document.getElementById('baseDate').value = new Date().toISOString().split('T')[0];
  const k = localStorage.getItem('lk');
  if (k) document.getElementById('apiKey').value = k;

  document.getElementById('apiKey').addEventListener('input',()=>
    localStorage.setItem('lk', document.getElementById('apiKey').value.trim()));

  const ln = document.getElementById('lawName');
  ln.addEventListener('input',  onInput);
  ln.addEventListener('keydown',onKey);
  ln.addEventListener('focus',  ()=>{ if (ln.value.trim().length>=2) openDD(); });
  ln.addEventListener('blur',   ()=> setTimeout(closeDD, 200));
  document.addEventListener('click', e=>{
    if (!e.target.closest('.sw')) closeDD();
  });
});

// ══════════════════════════════════════════════════
//  자동완성 — 디바운스 700ms, 2자 이상, 캐싱, 단일 프록시
// ══════════════════════════════════════════════════
function onInput(){
  selItem = null;
  hlIdx = -1;
  clearTimeout(acTimer);
  if (acAbort) acAbort.abort();

  const q = document.getElementById('lawName').value.trim();

  if (q.length < 2) {
    closeDD();
    hideSpinner();
    return;
  }

  // 캐시 즉시 표시
  if (ACcache.has(q)) {
    renderDD(ACcache.get(q));
    return;
  }

  showSpinner();
  acTimer = setTimeout(()=> doAC(q), 700);
}

function onKey(e){
  const dd = document.getElementById('lawDD');
  const items = dd.querySelectorAll('.di');
  if (e.key === 'ArrowDown' && items.length) {
    e.preventDefault();
    hlIdx = Math.min(hlIdx+1, items.length-1);
    updateHL(items);
  } else if (e.key === 'ArrowUp' && items.length) {
    e.preventDefault();
    hlIdx = Math.max(hlIdx-1, 0);
    updateHL(items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (hlIdx >= 0 && items[hlIdx]) {
      items[hlIdx].dispatchEvent(new MouseEvent('mousedown'));
    } else {
      closeDD();
      go();
    }
  } else if (e.key === 'Escape') {
    closeDD();
  }
}
function updateHL(items){
  items.forEach((it,i)=> it.classList.toggle('hl', i===hlIdx));
  if (items[hlIdx]) items[hlIdx].scrollIntoView({block:'nearest'});
}

async function doAC(q){
  const oc = document.getElementById('apiKey').value.trim();
  if (!oc) { hideSpinner(); return; }

  acAbort = new AbortController();
  const url = `${API}/lawSearch.do?OC=${oc}&target=law&type=XML&display=20&search=2&query=${encodeURIComponent(q)}&lasYn=Y`;

  try {
    // 자동완성은 빠른 프록시 1개만 시도 (3초)
    const text = await fetchFast(url, acAbort.signal);
    if (!text) { hideSpinner(); return; }

    const xml  = parseXML(text);
    const laws = Array.from(xml.querySelectorAll('law, 법령'));
    const results = laws.map(metaFrom).filter(m=>m.name);

    ACcache.set(q, results);
    renderDD(results);
  } catch(e) {
    if (e.name !== 'AbortError') {
      const dd = document.getElementById('lawDD');
      dd.innerHTML = '<div class="de">자동완성 일시 오류 · 직접 입력 후 조회 버튼을 눌러주세요</div>';
      openDD();
    }
  } finally {
    hideSpinner();
  }
}

function renderDD(results){
  const dd = document.getElementById('lawDD');
  dd.innerHTML = '';
  if (results.length === 0) {
    dd.innerHTML = '<div class="de">검색 결과 없음</div>';
  } else {
    results.forEach(m=>{
      const d = document.createElement('div');
      d.className = 'di';
      d.innerHTML = `<span class="dn">${esc(m.name)}</span>
        <span class="dm">${m.kind?m.kind+' · ':''}시행 ${fdate(m.siDat)}</span>`;
      d.addEventListener('mousedown', e=>{
        e.preventDefault();
        selItem = m;
        document.getElementById('lawName').value = m.name;
        closeDD();
      });
      dd.appendChild(d);
    });
  }
  openDD();
  hlIdx = -1;
}

// ══════════════════════════════════════════════════
//  메인 검색
// ══════════════════════════════════════════════════
async function go(){
  const oc = document.getElementById('apiKey').value.trim();
  const dv = document.getElementById('baseDate').value;
  const lv = document.getElementById('lawName').value.trim();
  const af = document.getElementById('artNo').value.trim();

  if (!oc) return showErr('API 인증키를 입력해주세요.');
  if (!dv) return showErr('기준일자를 입력해주세요.');
  if (!lv) return showErr('법령명을 입력해주세요.');

  const bd = dv.replace(/-/g,'');

  clearErr(); hideRes(); showProg();
  document.getElementById('searchBtn').disabled = true;
  lastXml = '';

  try {
    // ── STEP 1: 법령 버전 탐색 ─────────────────
    addSt('s1','doing','[1/4] 기준일 기준 법령 버전 탐색...');
    setSt('법령 버전 조회 중...');
    const law = await findVersion(oc, lv, bd);
    if (!law) throw new Error(`'${lv}' 법령을 찾을 수 없습니다.\n· 법령명을 정확히 입력하세요 (예: 소득세법)\n· 자동완성 목록에서 선택하면 가장 정확합니다`);
    doneSt('s1', `[1/4] 확인: ${law.name}  (시행 ${fdate(law.siDat)})`);

    // ── STEP 2: 본문 XML 조회 ────────────────
    addSt('s2','doing','[2/4] 본문 XML 로드 중...');
    setSt('본문 XML 다운로드 중...');
    const raw = await fetchAll(`${API}/lawService.do?OC=${oc}&target=law&ID=${law.lsiSeq}&type=XML`);
    lastXml = raw;
    document.getElementById('dtg').style.display = 'inline-block';
    doneSt('s2', `[2/4] 본문 로드 (${(raw.length/1024).toFixed(1)} KB)`);

    // ── STEP 3: 파싱 ─────────────────────────
    addSt('s3','doing','[3/4] 조문·부칙 파싱 중...');
    const doc = parseXML(raw);
    const arts = parseArts(doc, af);
    const adds = parseAdds(doc, bd);
    doneSt('s3', `[3/4] 조문 ${arts.length}건 · 부칙 ${adds.length}건`);

    // ── STEP 4: 출력 ─────────────────────────
    addSt('s4','doing','[4/4] 결과 출력 중...');
    hideProg();
    renderRes(law, arts, adds, bd, af, raw);
    doneSt('s4','[4/4] 완료');

  } catch(e) {
    hideProg();
    showErr(e.message || '오류 발생');
  }
  document.getElementById('searchBtn').disabled = false;
}

// ══════════════════════════════════════════════════
//  법령 버전 탐색 (기준일 이하 최신)
// ══════════════════════════════════════════════════
async function findVersion(oc, name, bd){
  // 자동완성에서 선택했으면 lsiSeq로 기본정보 이미 확보, 하지만 기준일 맞는 연혁 찾기 위해 전체 조회
  const url = `${API}/lawSearch.do?OC=${oc}&target=law&type=XML&display=100&search=2&query=${encodeURIComponent(name)}&lasYn=N`;
  const txt = await fetchAll(url);
  const xml = parseXML(txt);
  const all = Array.from(xml.querySelectorAll('law, 법령')).map(metaFrom).filter(m=>m.name);
  if (!all.length) return null;

  // 1) 정확 이름 매칭 풀
  let pool = all.filter(m => m.name === name);
  if (!pool.length) {
    // 2) 공백 제거 비교
    const nn = name.replace(/\s/g,'');
    pool = all.filter(m => m.name.replace(/\s/g,'') === nn);
  }
  if (!pool.length) pool = all;  // 3) 포함 전체

  // 시행일 <= 기준일 중 최신
  const valid = pool.filter(m => (m.siDat || '99999999') <= bd)
    .sort((a,b) => (b.siDat||'').localeCompare(a.siDat||''));

  return valid[0] || pool.sort((a,b)=>(a.siDat||'').localeCompare(b.siDat||''))[0];
}

function metaFrom(el){
  return {
    lsiSeq:  g(el,'법령일련번호') || g(el,'법령ID'),
    name:    g(el,'법령명한글') || g(el,'법령명_한글') || g(el,'법령명'),
    siDat:   g(el,'시행일자'),
    promDt:  g(el,'공포일자'),
    promNo:  g(el,'공포번호'),
    kind:    g(el,'법령종류명') || g(el,'법종구분'),
    dept:    g(el,'소관부처명'),
  };
}

// ══════════════════════════════════════════════════
//  조문 파싱 — law.go.kr DRF XML 실제 구조 대응
//
//  실제 DRF XML 구조:
//  <조문>
//    <조문단위>
//      <조문키>0001000</조문키>
//      <조문번호>1</조문번호>            ← 숫자만 "1" "14"
//      <조문가지번호>0</조문가지번호>      ← 의2, 의3 구분
//      <조문제목>목적</조문제목>
//      <조문여부>조문</조문여부>         ← "조문" or "전문"
//      <조문시행일자>20210101</조문시행일자>
//      <조문내용>제1조(목적) 이 법은 ...</조문내용>  ← 전체 텍스트 포함
//      <항>
//        <항번호>①</항번호>
//        <항내용>제1항 내용...</항내용>
//      </항>
//    </조문단위>
//  </조문>
// ══════════════════════════════════════════════════
function parseArts(doc, filter){
  // 조문단위만 정확히 선택
  const units = Array.from(doc.getElementsByTagName('조문단위'));
  const result = [];

  units.forEach(u => {
    // "조문여부"가 "전문"이면 건너뜀 (목차/전문 등)
    const kind = g(u,'조문여부');
    if (kind === '전문') return;

    const num  = g(u,'조문번호');
    const sub  = g(u,'조문가지번호');   // "2" → 의2
    const title = g(u,'조문제목');

    if (!num) return;

    // 표시용 번호: "제1조" or "제14조의2"
    const display = sub && sub !== '0' ? `제${num}조의${sub}` : `제${num}조`;

    // 필터
    if (filter) {
      const fClean = filter.replace(/[제조\s]/g,'').replace(/의/g,'의');
      const candidates = [num, num+'의'+sub, display.replace(/[제조\s]/g,'')];
      if (!candidates.some(c => c === fClean) && !display.includes(filter.replace(/\s/g,''))) return;
    }

    // 본문: 조문내용 우선, 없으면 항/호/목 조합
    let body = g(u,'조문내용');
    const hangs = Array.from(u.getElementsByTagName('항'));
    if (hangs.length > 0) {
      const lines = body ? [body] : [];
      hangs.forEach(h => {
        const hn = g(h,'항번호');
        const ht = g(h,'항내용');
        if (ht) lines.push((hn?hn+' ':'') + ht);
        Array.from(h.getElementsByTagName('호')).forEach(ho => {
          const hon = g(ho,'호번호');
          const hot = g(ho,'호내용');
          if (hot) lines.push('  ' + (hon?hon+' ':'') + hot);
          Array.from(ho.getElementsByTagName('목')).forEach(m => {
            const mn = g(m,'목번호');
            const mt = g(m,'목내용');
            if (mt) lines.push('    ' + (mn?mn+' ':'') + mt);
          });
        });
      });
      body = lines.join('\n');
    }

    result.push({ num: display, title, body: body || '(내용 없음)' });
  });

  return result;
}

// ══════════════════════════════════════════════════
//  부칙 파싱
// ══════════════════════════════════════════════════
function parseAdds(doc, bd){
  const units = Array.from(doc.getElementsByTagName('부칙단위'));
  const result = [];

  units.forEach(bu => {
    const promDt = g(bu,'부칙공포일자') || g(bu,'공포일자');
    const promNo = g(bu,'부칙공포번호') || g(bu,'공포번호');
    // 부칙의 시행일은 부칙 내용 안에 "이 법은 ~부터 시행한다" 형태로 들어있음
    // 공포일자로 기준일 비교
    if (promDt && promDt > bd) return;

    const content = g(bu,'부칙내용') || bu.textContent.replace(/\s{2,}/g,' ').trim();
    result.push({
      num:    promNo ? `부칙 제${promNo}호` : '부칙',
      title:  promDt ? `공포 ${fdate(promDt)}` : '',
      body:   content.slice(0, 4000),
      promDt,
    });
  });

  // 공포일 내림차순 정렬
  result.sort((a,b) => (b.promDt||'').localeCompare(a.promDt||''));
  return result;
}

// ══════════════════════════════════════════════════
//  결과 렌더링

function renderRes(law, arts, adds, bd, filter, raw){
  document.getElementById('result').style.display = 'block';
  document.getElementById('rTitle').textContent = law.name;
  document.getElementById('rMeta').innerHTML = `
    <span class="bx bb">기준일 ${fdate(bd)}</span>
    <span class="bx bg">시행 ${fdate(law.siDat)}</span>
    ${law.kind  ? `<span class="bx bt">${law.kind}</span>` : ''}
    ${law.dept  ? `<span class="bx bpp">${law.dept}</span>` : ''}
    ${law.promDt? `<span class="bx by">공포 ${fdate(law.promDt)}</span>` : ''}`;
  document.getElementById('rLink').href = `https://www.law.go.kr/lsInfoP.do?lsiSeq=${law.lsiSeq}&efYd=${bd}`;

  const w = document.getElementById('rContent');
  w.innerHTML = '';

  if (arts.length === 0) {
    const b = document.createElement('div');
    b.className = filter ? 'ib' : 'wb';
    b.innerHTML = filter
      ? `<strong>${esc(filter)}</strong>에 해당하는 조문이 없습니다.<br>
         예시 형식: <code>제1조</code> / <code>1</code> / <code>제14조의2</code> / <code>14의2</code>`
      : `⚠ 조문을 자동 파싱하지 못했습니다.<br>
         아래 "원본 XML 확인"을 눌러 데이터 구조를 확인하거나,
         <a class="ll" href="https://www.law.go.kr/lsInfoP.do?lsiSeq=${law.lsiSeq}&efYd=${bd}" target="_blank">🔗 국가법령정보센터</a>에서 직접 확인하세요.`;
    w.appendChild(b);
    if (!filter) {
      document.getElementById('dtg').style.display = 'inline-block';
      document.getElementById('progCard').style.display = 'block';
      showDbg();
    }
  } else {
    const ib = document.createElement('div');
    ib.className = 'ib';
    ib.innerHTML = `<strong>${fdate(bd)}</strong> 기준 <strong>${esc(law.name)}</strong>
      ${filter ? `<strong>${esc(filter)}</strong> 조문` : `전체 조문 <strong>${arts.length}건</strong>`}
      ${adds.length ? ` · 부칙 <strong>${adds.length}건</strong>` : ''}`;
    w.appendChild(ib);
  }

  if (arts.length) {
    const s = document.createElement('div');
    s.className = 'as';
    s.innerHTML = `<div class="sl2">📄 본문 조문 ${arts.length}건</div>`;
    arts.forEach(a => s.appendChild(makeCard(a,false)));
    w.appendChild(s);
  }

  if (adds.length) {
    const s = document.createElement('div');
    s.className = 'as';
    s.innerHTML = `<div class="sl2">📎 부칙 (기준일 이전 공포 ${adds.length}건)</div>`;
    adds.forEach(a => s.appendChild(makeCard(a,true)));
    w.appendChild(s);
  }
}

function makeCard(a, isAdd){
  const d = document.createElement('div');
  d.className = isAdd ? 'ar ad' : 'ar';
  d.innerHTML = `<div class="ah" onclick="this.parentElement.classList.toggle('open')">
    <span class="an">${esc(a.num)}</span>
    <span class="at">${esc(a.title||'')}</span>
    <span class="av">▾</span>
  </div>
  <div class="ab">${esc(a.body)||'(내용 없음)'}</div>`;
  return d;
}

//  네트워크 — 2개 전략
// ══════════════════════════════════════════════════

// 빠른 fetch — 자동완성용, 첫번째 프록시만 짧은 타임아웃
async function fetchFast(url, signal){
  const p = PROXIES[0];
  try {
    const r = await fetch(p.build(url), {
      signal,
      // 외부 signal과 타임아웃 signal을 결합
    });
    if (!r.ok) return null;
    const t = await r.text();
    if (t.length < 50 || t.trimStart().startsWith('<!DOCTYPE html')) return null;
    return t;
  } catch(e) {
    if (e.name === 'AbortError') throw e;
    return null;
  }
}

// 전체 fetch — 본 검색용, 모든 프록시 순차 시도
async function fetchAll(url){
  let lastErr = '';
  for (let i = 0; i < PROXIES.length; i++) {
    const p = PROXIES[i];
    setSt(`서버 연결 중 (${p.name}, ${i+1}/${PROXIES.length})...`);
    try {
      const r = await fetch(p.build(url), { signal: AbortSignal.timeout(p.timeout) });
      if (!r.ok) { lastErr = `HTTP ${r.status}`; continue; }
      const t = await r.text();
      if (t.length < 50 || t.trimStart().startsWith('<!DOCTYPE html')) { lastErr='무효 응답'; continue; }
      // 성공한 프록시 맨 앞으로
      PROXIES.unshift(PROXIES.splice(i,1)[0]);
      return t;
    } catch(e) {
      lastErr = e.name === 'TimeoutError' ? '응답 시간 초과' : e.message;
    }
  }
  throw new Error(
    `CORS 프록시 연결 실패 (${lastErr})\n\n` +
    `해결 방법:\n` +
    `① 30초~1분 후 다시 시도\n` +
    `② VPN · 방화벽 끄고 시도\n` +
    `③ 인증키(OC)가 맞는지 확인\n` +
    `④ law.go.kr에서 직접 확인`
  );
}

// ══════════════════════════════════════════════════
//  유틸
// ══════════════════════════════════════════════════
function parseXML(t){
  const d = new DOMParser().parseFromString(t, 'text/xml');
  if (d.querySelector('parsererror')) throw new Error('XML 파싱 실패 — 원본 XML 확인 필요');
  return d;
}
function g(el, tag){
  // getElementsByTagName으로 다중 매칭 지원 (첫번째만 반환)
  const nodes = el.getElementsByTagName(tag);
  return nodes.length > 0 ? (nodes[0].textContent||'').trim() : '';
}
function fdate(s){ return (!s || s.length !== 8) ? (s||'') : `${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}`; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function openDD(){ document.getElementById('lawDD').classList.add('open'); }
function closeDD(){ document.getElementById('lawDD').classList.remove('open'); hlIdx=-1; }
function showSpinner(){ document.getElementById('acSpinner').style.display = 'block'; }
function hideSpinner(){ document.getElementById('acSpinner').style.display = 'none'; }

function showProg(){ document.getElementById('progCard').style.display='block'; document.getElementById('stepList').innerHTML=''; document.getElementById('dbox').classList.remove('on'); document.getElementById('dtg').style.display='none'; }
function hideProg(){ document.getElementById('progCard').style.display='none'; }
function setSt(m){ document.getElementById('statusMsg').textContent = m; }
function addSt(id, state, msg){
  const icon = {doing:'◉',done:'✓',fail:'✗'}[state] || '·';
  const d = document.createElement('div');
  d.className = `st ${state}`;
  d.id = id;
  d.innerHTML = `<span class="si">${icon}</span><span>${msg}</span>`;
  document.getElementById('stepList').appendChild(d);
}
function doneSt(id, msg){
  const e = document.getElementById(id);
  if (e) { e.className='st done'; e.innerHTML=`<span class="si">✓</span><span>${msg}</span>`; }
}
function showErr(m){ const b=document.getElementById('errBox'); b.textContent='⚠ '+m; b.classList.add('on'); }
function clearErr(){ document.getElementById('errBox').classList.remove('on'); }
function hideRes(){ document.getElementById('result').style.display='none'; }
function showDbg(){ const b=document.getElementById('dbox'); b.textContent=lastXml.slice(0,6000)||'(없음)'; b.classList.add('on'); }
function toggleDbg(){ const b=document.getElementById('dbox'); b.classList.contains('on')?b.classList.remove('on'):showDbg(); }
function reset(){
  clearErr(); hideRes(); hideProg();
  document.getElementById('lawName').value='';
  document.getElementById('artNo').value='';
  selItem=null; lastXml=''; ACcache.clear();
}
